<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocabSwipe - CEFR Flashcards</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --secondary: #e5e7eb;
            --cefr-a: #10b981; /* Green */
            --cefr-b: #3b82f6; /* Blue */
            --cefr-c: #8b5cf6; /* Purple */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .thai-text {
            font-family: 'Kanit', sans-serif;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2rem;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        /* CEFR Level Selector */
        .level-selector {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .level-btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 9999px;
            background-color: var(--secondary);
            color: var(--text-main);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .level-btn:hover {
            background-color: #d1d5db;
        }

        .level-btn.active {
            background-color: var(--primary);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.4);
        }

        /* Flashcard Container */
        .card-container {
            width: 100%;
            max-width: 500px;
            height: 350px;
            perspective: 1000px;
            margin-bottom: 2rem;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            background-color: var(--card-bg);
            border-radius: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2.5rem;
            text-align: center;
        }

        .card-back {
            transform: rotateY(180deg);
        }

        /* Card Typography & Badges */
        .word-en {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--text-main);
        }

        .word-th {
            font-size: 2.5rem;
            font-weight: 500;
            color: var(--primary);
            margin-bottom: 1.5rem;
        }

        .badge-container {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-pos { background-color: #f3f4f6; color: #4b5563; }
        .badge-tag { background-color: #fef3c7; color: #d97706; }
        
        .cefr-A1, .cefr-A2 { background-color: #d1fae5; color: #047857; }
        .cefr-B1, .cefr-B2 { background-color: #dbeafe; color: #1d4ed8; }
        .cefr-C1, .cefr-C2 { background-color: #ede9fe; color: #6d28d9; }

        .sentence-box {
            background-color: #f9fafb;
            padding: 1rem;
            border-radius: 0.75rem;
            width: 100%;
            border-left: 4px solid var(--primary);
        }

        .sentence-en {
            font-size: 1.125rem;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .sentence-th {
            font-size: 1rem;
            color: var(--text-muted);
        }

        .flip-hint {
            position: absolute;
            bottom: 1rem;
            font-size: 0.875rem;
            color: #9ca3af;
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 1rem;
            align-items: center;
            width: 100%;
            max-width: 500px;
            justify-content: space-between;
        }

        .nav-btn {
            background-color: var(--card-bg);
            border: 1px solid #e5e7eb;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-btn:hover:not(:disabled) {
            background-color: #f9fafb;
            border-color: #d1d5db;
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .progress {
            font-weight: 500;
            color: var(--text-muted);
        }

        #loading, #error-msg {
            display: none;
            text-align: center;
            margin-top: 2rem;
        }

        #error-msg { color: #dc2626; }
    </style>
</head>
<body>

    <header>
        <h1>Master Vocabulary</h1>
        <p class="text-muted">Select a level and tap the card to reveal the meaning.</p>
    </header>

    <div class="level-selector" id="levelSelector">
        <button class="level-btn active" data-level="All">All Levels</button>
        <button class="level-btn" data-level="A1">A1</button>
        <button class="level-btn" data-level="A2">A2</button>
        <button class="level-btn" data-level="B1">B1</button>
        <button class="level-btn" data-level="B2">B2</button>
        <button class="level-btn" data-level="C1">C1</button>
        <button class="level-btn" data-level="C2">C2</button>
    </div>

    <div id="loading">Loading vocabulary data...</div>
    <div id="error-msg">Error loading data. Make sure you are running a local server.</div>

    <div class="card-container" id="cardContainer" style="display: none;">
        <div class="flashcard" id="flashcard" onclick="toggleFlip()">
            <div class="card-face card-front">
                <div class="badge-container">
                    <span class="badge badge-pos" id="cardPos">noun</span>
                    <span class="badge" id="cardCefr">A1</span>
                </div>
                <h2 class="word-en" id="cardWord">word</h2>
                <div class="flip-hint">Tap to flip or press Space</div>
            </div>
            
            <div class="card-face card-back">
                <h2 class="word-th thai-text" id="cardThai">คำแปล</h2>
                <div class="badge-container">
                    <span class="badge badge-tag" id="cardTag">tag</span>
                </div>
                <div class="sentence-box">
                    <p class="sentence-en" id="cardSentenceEn">Example sentence.</p>
                    <p class="sentence-th thai-text" id="cardSentenceTh">ประโยคตัวอย่าง</p>
                </div>
            </div>
        </div>
    </div>

    <div class="controls" id="controls" style="display: none;">
        <button class="nav-btn" id="prevBtn" onclick="prevCard()">
            <span>&larr;</span> Back
        </button>
        <div class="progress" id="progressText">0 / 0</div>
        <button class="nav-btn" id="nextBtn" onclick="nextCard()">
            Next <span>&rarr;</span>
        </button>
    </div>

    <script>
        let allData = [];
        let currentDeck = [];
        let currentIndex = 0;
        let isFlipped = false;

        // Fetch the JSONL file
        async function loadData() {
            document.getElementById('loading').style.display = 'block';
            try {
                const response = await fetch('input.jsonl');
                if (!response.ok) throw new Error('Network response was not ok');
                
                const text = await response.text();
                
                // Parse JSONL
                allData = text.trim().split('\n').map(line => {
                    try {
                        return JSON.parse(line);
                    } catch (e) {
                        return null;
                    }
                }).filter(item => item !== null);

                document.getElementById('loading').style.display = 'none';
                document.getElementById('cardContainer').style.display = 'block';
                document.getElementById('controls').style.display = 'flex';
                
                filterCards('All');
            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        function filterCards(level) {
            // Update active button styling
            document.querySelectorAll('.level-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.level === level);
            });

            // Filter data
            if (level === 'All') {
                currentDeck = [...allData];
            } else {
                currentDeck = allData.filter(item => item.cefr === level);
            }

            // Shuffle the deck for randomness
            shuffleArray(currentDeck);
            currentIndex = 0;
            
            if (currentDeck.length > 0) {
                updateCardView();
            } else {
                document.getElementById('cardWord').innerText = "No cards found";
            }
        }

        function updateCardView() {
            if (isFlipped) toggleFlip(); // Reset flip state

            const card = currentDeck[currentIndex];
            
            // Front elements
            document.getElementById('cardWord').innerText = card.english;
            document.getElementById('cardPos').innerText = card.pos;
            
            const cefrBadge = document.getElementById('cardCefr');
            cefrBadge.innerText = card.cefr;
            cefrBadge.className = `badge cefr-${card.cefr}`;

            // Back elements
            document.getElementById('cardThai').innerText = card.thai;
            document.getElementById('cardTag').innerText = card.tag.replace('_', ' ');
            document.getElementById('cardSentenceEn').innerText = `"${card.sentence_en}"`;
            document.getElementById('cardSentenceTh').innerText = card.sentence_th;

            // Update Progress & Buttons
            document.getElementById('progressText').innerText = `${currentIndex + 1} / ${currentDeck.length}`;
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').disabled = currentIndex === currentDeck.length - 1;
        }

        function toggleFlip() {
            const flashcard = document.getElementById('flashcard');
            isFlipped = !isFlipped;
            flashcard.classList.toggle('flipped');
        }

        function nextCard() {
            if (currentIndex < currentDeck.length - 1) {
                currentIndex++;
                updateCardView();
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                updateCardView();
            }
        }

        // Fisher-Yates Shuffle
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // Event Listeners
        document.getElementById('levelSelector').addEventListener('click', (e) => {
            if (e.target.classList.contains('level-btn')) {
                filterCards(e.target.dataset.level);
            }
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (currentDeck.length === 0) return;
            
            if (e.code === 'Space') {
                e.preventDefault();
                toggleFlip();
            } else if (e.code === 'ArrowRight') {
                nextCard();
            } else if (e.code === 'ArrowLeft') {
                prevCard();
            }
        });

        // Initialize
        window.onload = loadData;
    </script>
</body>
</html>
